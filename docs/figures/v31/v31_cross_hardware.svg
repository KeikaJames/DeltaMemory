<svg xmlns="http://www.w3.org/2000/svg" width="1088" height="600" viewBox="0 0 1088 600" role="img">
  <style>
    .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1D1D1F; }
    .subtitle { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6E6E73; }
    .label { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1D1D1F; }
    .small { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6E6E73; }
    .tiny { font: 500 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6E6E73; }
    .value { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1D1D1F; }
  </style>
  <text x="40" y="48" class="title">Cross-hardware reproducibility</text>
  <text x="40" y="75" class="subtitle">Mac MPS reproduces GB10 CUDA on the same five counter-prior writes.</text>
  <rect x="24" y="94" width="1040" height="470" rx="34" fill="#F5F5F7"/>
  <line x1="160.0" y1="128" x2="160.0" y2="488" stroke="#E8EAED" stroke-width="1"/>
  <line x1="160" y1="488.0" x2="520" y2="488.0" stroke="#E8EAED" stroke-width="1"/>
  <text x="160.0" y="512" text-anchor="middle" class="tiny">+0</text>
  <text x="142" y="492.0" text-anchor="end" class="tiny">+0</text>
  <line x1="280.0" y1="128" x2="280.0" y2="488" stroke="#E8EAED" stroke-width="1"/>
  <line x1="160" y1="368.0" x2="520" y2="368.0" stroke="#E8EAED" stroke-width="1"/>
  <text x="280.0" y="512" text-anchor="middle" class="tiny">+1</text>
  <text x="142" y="372.0" text-anchor="end" class="tiny">+1</text>
  <line x1="400.0" y1="128" x2="400.0" y2="488" stroke="#E8EAED" stroke-width="1"/>
  <line x1="160" y1="248.0" x2="520" y2="248.0" stroke="#E8EAED" stroke-width="1"/>
  <text x="400.0" y="512" text-anchor="middle" class="tiny">+2</text>
  <text x="142" y="252.0" text-anchor="end" class="tiny">+2</text>
  <line x1="520.0" y1="128" x2="520.0" y2="488" stroke="#E8EAED" stroke-width="1"/>
  <line x1="160" y1="128.0" x2="520" y2="128.0" stroke="#E8EAED" stroke-width="1"/>
  <text x="520.0" y="512" text-anchor="middle" class="tiny">+3</text>
  <text x="142" y="132.0" text-anchor="end" class="tiny">+3</text>
  <line x1="160" y1="488" x2="520" y2="128" stroke="#6E6E73" stroke-width="2" stroke-dasharray="7 8"/>
  <circle cx="230.4" cy="400.5" r="8" fill="#007AFF" opacity="0.86"/>
  <text x="241.4" y="391.5" class="tiny">Napoleon</text>
  <circle cx="325.1" cy="306.7" r="8" fill="#007AFF" opacity="0.86"/>
  <text x="336.1" y="297.7" class="tiny">Pablo</text>
  <circle cx="302.7" cy="350.5" r="8" fill="#007AFF" opacity="0.86"/>
  <text x="313.7" y="341.5" class="tiny">Vincent</text>
  <circle cx="243.7" cy="397.1" r="8" fill="#007AFF" opacity="0.86"/>
  <text x="254.7" y="388.1" class="tiny">Isaac</text>
  <circle cx="481.4" cy="145.3" r="8" fill="#007AFF" opacity="0.86"/>
  <text x="492.4" y="136.3" class="tiny">Ada</text>
  <circle cx="251.7" cy="422.9" r="8" fill="#4285F4" opacity="0.86"/>
  <text x="262.7" y="413.9" class="tiny">Napoleon</text>
  <circle cx="189.3" cy="428.5" r="8" fill="#4285F4" opacity="0.86"/>
  <text x="200.3" y="419.5" class="tiny">Pablo</text>
  <circle cx="262.3" cy="385.5" r="8" fill="#4285F4" opacity="0.86"/>
  <text x="273.3" y="376.5" class="tiny">Vincent</text>
  <circle cx="285.6" cy="366.8" r="8" fill="#4285F4" opacity="0.86"/>
  <text x="296.6" y="357.8" class="tiny">Isaac</text>
  <circle cx="333.5" cy="296.6" r="8" fill="#4285F4" opacity="0.86"/>
  <text x="344.5" y="287.6" class="tiny">Ada</text>
  <text x="340.0" y="542" text-anchor="middle" class="label">GB10 CUDA Δ log-prob</text>
  <text x="64" y="308.0" transform="rotate(-90 64 308.0)" text-anchor="middle" class="label">Mac MPS Δ log-prob</text>
  <rect x="650" y="180" width="300" height="156" rx="24" fill="white" stroke="#E8EAED"/>
  <text x="680" y="222" class="label">Result</text>
  <text x="680" y="254" class="small">Gemma-4: 5/5 positive on both machines</text>
  <text x="680" y="282" class="small">Qwen3: 5/5 positive on both machines</text>
  <text x="680" y="310" class="small">bf16 differences stay in the same band</text>
  <circle cx="682" cy="378" r="7" fill="#007AFF"/><text x="700" y="382" class="small">Gemma-4</text>
  <circle cx="805" cy="378" r="7" fill="#4285F4"/><text x="823" y="382" class="small">Qwen3</text>

</svg>
