services:
  mneme:
    build:
      context: ..
      dockerfile: docker/Dockerfile.production
      target: runtime
      platforms:
        - linux/amd64
    image: mneme:production-dev
    environment:
      MNEME_HOST: 0.0.0.0
      MNEME_PORT: 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
