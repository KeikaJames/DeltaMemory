variants:
- name: correct_bank
  method: anb
  alpha: 1.0
  bank_key_mode: post_rope
  value_scale_mode: auto_rms_cap
  bank_perturbation: null
  enable_scar: false
  description: Production ATB with post_rope; reference.
- name: shuffled_bank
  method: anb
  alpha: 1.0
  bank_key_mode: post_rope
  value_scale_mode: auto_rms_cap
  bank_perturbation: shuffled
  enable_scar: false
  description: Fact↔target labels permuted within bank.
- name: random_kv
  method: anb
  alpha: 1.0
  bank_key_mode: post_rope
  value_scale_mode: auto_rms_cap
  bank_perturbation: random_kv
  enable_scar: false
  description: K and V both Gaussian, RMS-matched per layer.
- name: correct_K_random_V
  method: anb
  alpha: 1.0
  bank_key_mode: post_rope
  value_scale_mode: auto_rms_cap
  bank_perturbation: random_V_only
  enable_scar: false
  description: Correct K (post_rope), random V.
- name: random_K_correct_V
  method: anb
  alpha: 1.0
  bank_key_mode: post_rope
  value_scale_mode: auto_rms_cap
  bank_perturbation: random_K_only
  enable_scar: false
  description: Random K, correct V (post_rope).
templates:
  write: "Fact: {subject} {phrase} {target_new}."
  read: prompt.format(subject)
modules:
  enabled:
  - AttnNativeBank
  disabled:
  - SCAR
  - CAA
  - LOPI-skip-list
metric_definitions:
  recall_at_1: argmax of next-token logits at end of read prompt equals first token of target_new
  margin: sum_logp(target_new | prompt) - sum_logp(target_true | prompt) over all target tokens
  target_rank: 0-indexed rank of first target_new token in next-token distribution
  js_drift: mean symmetric Jensen-Shannon divergence (nats) over last-8 logits across 100 fixed neutral prompts
  kl_drift: mean KL(p_baseline || p_patched) (nats) over last-8 logits across 100 fixed neutral prompts
  bank_attention_mass: sum of merged-softmax weights over bank columns, mean across (B,H,T,layers)
  max_bank_prob: max merged-softmax weight on any bank column, mean across (B,H,T,layers)
gpu:
  cuda_available: true
  device_count: 1
  device_name_0: NVIDIA GB10
  torch_version: 2.13.0.dev20260505+cu130
  cuda_version: 13.0
  mps_available: false
extra:
  bank_key_mode: post_rope
  motivation: "Exp 6 used pre_rope which is near-no-op on Gemma-4-31B. This rerun uses post_rope, the only mode with confirmed positive margin on Gemma-4-31B (Exp 1: +0.088 mean)."
  perturbation_protocol: Random K/V draws use torch.Generator('cpu').manual_seed(0xC0FFEE); per-layer RMS-matched to true bank.
  n_prompts: null
